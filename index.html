<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AKA MARTECH AGENCY Workspace</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Thư viện react-is (Yêu cầu bắt buộc của Recharts/prop-types trong môi trường UMD) -->
  <script crossorigin src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
  
  <!-- Ánh xạ React để lucide-react (bản UMD) có thể nhận diện đúng -->
  <script>
    window.react = window.React;
  </script>
  
  <!-- Babel cho phép biên dịch JSX trực tiếp trên trình duyệt -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Recharts Dependencies -->
  <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide-react@0.292.0/dist/umd/lucide-react.min.js"></script>
  
  <!-- SheetJS cho chức năng Xuất Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    /* Tuỳ chỉnh Scrollbar cho giao diện đẹp hơn */
    .scrollbar-none::-webkit-scrollbar { display: none; }
    .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background-color: #d1d5db; border-radius: 20px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    
    // Bắt chính xác biến toàn cục của LucideReact
    const LucideIcons = window.lucideReact || window.LucideReact || window.lucide || window.Lucide;
    
    // Khởi tạo các Icons
    const { 
      LayoutDashboard, Clock, FileSpreadsheet, Settings, Plus, Trash2, 
      CheckCircle, Download, User, Briefcase, Layers, TrendingUp, 
      Calendar, AlertCircle, Info, Users, Cpu, Filter, Sliders, FolderPlus 
    } = LucideIcons;
    
    // Fallback an toàn cho đối tượng Recharts
    const RechartsLib = window.Recharts || window.recharts || {};

    // Import Chart components từ Recharts
    const { 
      BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, 
      ResponsiveContainer, Cell, Legend 
    } = RechartsLib;

    // Bảng màu Chart được tuỳ chỉnh theo nhận diện thương hiệu aka
    const COLORS = [
      '#FACC15', '#1F2937', '#F59E0B', '#4B5563', 
      '#0F766E', '#D97706', '#334155', '#CA8A04', 
      '#0369A1', '#9CA3AF'
    ];

    const TASK_COLORS = [
      '#FACC15', '#334155', '#F59E0B', '#0F766E', 
      '#D97706', '#4B5563', '#0369A1', '#CA8A04', '#9CA3AF'
    ];

    // Các nhóm công việc tiêu chuẩn cho dropdown
    const TASK_CATEGORIES = [
      "Integration", "Technical Support", "Paperwork", "PM", 
      "Monitor", "Report", "Training", "Operation", "Others"
    ];

    const BUSINESS_UNITS = ["BU1", "BU2"];
    const INITIAL_SERVICES = ["License", "Services"];

    // ĐÃ XÓA TOÀN BỘ DỮ LIỆU MẪU ĐỂ NHẬP TỪ ĐẦU
    const INITIAL_USERS = [];
    const INITIAL_PROJECTS = [];
    const INITIAL_CUSTOM_FIELDS = [];
    const INITIAL_TIME_LOGS = [];

    // Helpers tính toán lịch tuần
    const getWeekRange = (weekStr) => {
      if (!weekStr) return "";
      const [year, weekNum] = weekStr.split('-W');
      const y = parseInt(year);
      const w = parseInt(weekNum);
      const simple = new Date(y, 0, 1 + (w - 1) * 7);
      const dow = simple.getDay();
      const ISOweekStart = simple;
      if (dow <= 4) {
        ISOweekStart.setDate(simple.getDate() - simple.getDay() + 1);
      } else {
        ISOweekStart.setDate(simple.getDate() + 8 - simple.getDay());
      }
      const start = new Date(ISOweekStart);
      const end = new Date(start);
      end.setDate(start.getDate() + 6);
      const formatDate = (d) => `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}`;
      return `${formatDate(start)} - ${formatDate(end)}`;
    };

    const getDateInfo = (dateStr) => {
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return null;
      const target = new Date(d.valueOf());
      const dayNr = (d.getDay() + 6) % 7;
      target.setDate(target.getDate() - dayNr + 3);
      const firstThursday = target.valueOf();
      target.setMonth(0, 1);
      if (target.getDay() !== 4) {
        target.setMonth(0, 1 + ((4 - target.getDay() + 7) % 7));
      }
      const weekNum = 1 + Math.ceil((firstThursday - target) / 604800000);
      const year = d.getFullYear();
      const week = `${year}-W${String(weekNum).padStart(2, '0')}`;
      const month = `${year}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      const qNum = Math.floor(d.getMonth() / 3) + 1;
      const quarter = `${year}-Q${qNum}`;
      return { week, month, quarter };
    };

    const getDaysOfWeek = (weekStr) => {
      if (!weekStr) return [];
      const [year, weekNum] = weekStr.split('-W');
      const y = parseInt(year);
      const w = parseInt(weekNum);
      const simple = new Date(y, 0, 1 + (w - 1) * 7);
      const dow = simple.getDay();
      const ISOweekStart = simple;
      if (dow <= 4) {
        ISOweekStart.setDate(simple.getDate() - simple.getDay() + 1);
      } else {
        ISOweekStart.setDate(simple.getDate() + 8 - simple.getDay());
      }
      const days = [];
      const weekdaysVietnamese = ["Thứ 2", "Thứ 3", "Thứ 4", "Thứ 5", "Thứ 6", "Thứ 7", "Chủ Nhật"];
      for (let i = 0; i < 7; i++) {
        const current = new Date(ISOweekStart);
        current.setDate(ISOweekStart.getDate() + i);
        const yyyy = current.getFullYear();
        const mm = String(current.getMonth() + 1).padStart(2, '0');
        const dd = String(current.getDate()).padStart(2, '0');
        days.push({
          dateStr: `${yyyy}-${mm}-${dd}`,
          displayName: weekdaysVietnamese[i],
          dateShort: `${dd}/${mm}`
        });
      }
      return days;
    };

    const getCurrentWeekString = () => {
      const info = getDateInfo(new Date().toISOString().split('T')[0]);
      return info ? info.week : "2026-W20"; // Giá trị fallback nếu lỗi
    };

    function App() {
      // App Navigation & Core States
      const [activeTab, setActiveTab] = useState('logtime');
      const [projects, setProjects] = useState(INITIAL_PROJECTS);
      const [users, setUsers] = useState(INITIAL_USERS);
      const [services, setServices] = useState(INITIAL_SERVICES);
      const [timeLogs, setTimeLogs] = useState(INITIAL_TIME_LOGS);
      const [customFields, setCustomFields] = useState(INITIAL_CUSTOM_FIELDS);
      
      const [currentUser, setCurrentUser] = useState("");
      const [toast, setToast] = useState({ show: false, message: "", type: "success" });

      // Auto-select user đầu tiên nếu currentUser trống và users có dữ liệu
      useEffect(() => {
        if (users.length > 0 && (!currentUser || !users.find(u => u.id === currentUser))) {
          setCurrentUser(users[0].id);
        } else if (users.length === 0) {
          setCurrentUser("");
        }
      }, [users, currentUser]);

      const triggerToast = (message, type = "success") => {
        setToast({ show: true, message, type });
        setTimeout(() => {
          setToast({ show: false, message: "", type: "success" });
        }, 4000);
      };

      /* -------------------------------------------------------------
         BỘ LỌC CHÍNH CỦA DASHBOARD BÁO CÁO TỔNG HỢP
         ------------------------------------------------------------- */
      const [filterProject, setFilterProject] = useState("ALL");
      const [filterBU, setFilterBU] = useState("ALL");
      const [filterService, setFilterService] = useState("ALL");
      const [dashboardFromDate, setDashboardFromDate] = useState(""); 
      const [dashboardToDate, setDashboardToDate] = useState(""); 
      const [filterUser, setFilterUser] = useState("ALL");

      const filteredLogs = useMemo(() => {
        return timeLogs.filter(log => {
          const proj = projects.find(p => p.id === log.projectId);
          const logBU = proj ? proj.bu : "N/A";

          const matchProject = filterProject === "ALL" || log.projectId === filterProject;
          const matchBU = filterBU === "ALL" || logBU === filterBU;
          const matchService = filterService === "ALL" || log.service === filterService;
          const matchUser = filterUser === "ALL" || log.userId === filterUser;
          
          let matchTime = true;
          if (dashboardFromDate) matchTime = matchTime && log.date >= dashboardFromDate;
          if (dashboardToDate) matchTime = matchTime && log.date <= dashboardToDate;
          
          return matchProject && matchBU && matchService && matchUser && matchTime;
        });
      }, [timeLogs, filterProject, filterBU, filterService, dashboardFromDate, dashboardToDate, filterUser, projects]);

      const totalHoursFiltered = useMemo(() => {
        return filteredLogs.reduce((sum, log) => sum + log.hours, 0);
      }, [filteredLogs]);

      const uniquePersonnelCount = useMemo(() => {
        return new Set(filteredLogs.map(log => log.userId)).size;
      }, [filteredLogs]);

      const bu1ProjectCount = useMemo(() => {
        const projIds = new Set(filteredLogs.map(log => log.projectId));
        return Array.from(projIds).filter(id => {
          const p = projects.find(proj => proj.id === id);
          return p && p.bu === 'BU1';
        }).length;
      }, [filteredLogs, projects]);

      const bu2ProjectCount = useMemo(() => {
        const projIds = new Set(filteredLogs.map(log => log.projectId));
        return Array.from(projIds).filter(id => {
          const p = projects.find(proj => proj.id === id);
          return p && p.bu === 'BU2';
        }).length;
      }, [filteredLogs, projects]);

      // Bảng tổng số lượng nhân sự theo dự án
      const projectPersonnelCountData = useMemo(() => {
        const grouped = {};
        filteredLogs.forEach(log => {
          const key = `${log.projectId}_${log.service}`;
          if (!grouped[key]) {
            const proj = projects.find(p => p.id === log.projectId);
            grouped[key] = {
              projectId: log.projectId,
              projectName: proj ? proj.name : "Unknown",
              bu: proj ? proj.bu : "N/A",
              service: log.service,
              userIds: new Set()
            };
          }
          grouped[key].userIds.add(log.userId);
        });

        return Object.values(grouped).map(item => ({
          ...item,
          personnelCount: item.userIds.size
        })).sort((a, b) => {
          if (a.bu !== b.bu) return a.bu.localeCompare(b.bu);
          return b.personnelCount - a.personnelCount;
        });
      }, [filteredLogs, projects]);

      // Đóng góp theo dự án
      const hoursByProjectData = useMemo(() => {
        const projectMap = {};
        projects.forEach(p => {
          projectMap[p.id] = { name: p.name, hours: 0 };
        });

        filteredLogs.forEach(log => {
          if (projectMap[log.projectId]) {
            projectMap[log.projectId].hours += log.hours;
          } else {
            projectMap[log.projectId] = { name: "Dự án khác", hours: log.hours };
          }
        });

        return Object.keys(projectMap)
          .map(id => ({
            id,
            name: projectMap[id].name.length > 25 ? projectMap[id].name.substring(0, 22) + "..." : projectMap[id].name,
            fullName: projectMap[id].name,
            hours: projectMap[id].hours
          }))
          .filter(item => item.hours > 0);
      }, [filteredLogs, projects]);

      // Biểu đồ nhân sự theo loại công việc
      const getChartDataForBU = (buName) => {
        const logsForBU = filteredLogs.filter(log => {
          const p = projects.find(proj => proj.id === log.projectId);
          return p && p.bu === buName;
        });

        const userMap = {};
        logsForBU.forEach(log => {
          if (!userMap[log.userId]) {
            const u = users.find(u => u.id === log.userId);
            userMap[log.userId] = { name: u ? u.name : log.userId };
            TASK_CATEGORIES.forEach(cat => userMap[log.userId][cat] = 0);
          }
          if (TASK_CATEGORIES.includes(log.description)) {
            userMap[log.userId][log.description] += log.hours;
          } else {
            userMap[log.userId]['Others'] = (userMap[log.userId]['Others'] || 0) + log.hours;
          }
        });

        return Object.values(userMap).filter(user => {
          return TASK_CATEGORIES.some(cat => user[cat] > 0);
        });
      };

      const chartDataBU1 = useMemo(() => getChartDataForBU('BU1'), [filteredLogs, projects, users]);
      const chartDataBU2 = useMemo(() => getChartDataForBU('BU2'), [filteredLogs, projects, users]);

      // Bảng Báo cáo công việc theo dự án
      const servicePersonnelContributionData = useMemo(() => {
        const grouped = {};

        filteredLogs.forEach(log => {
          const key = `${log.userId}_${log.projectId}_${log.service}`;
          const userObj = users.find(u => u.id === log.userId);
          const projObj = projects.find(p => p.id === log.projectId);

          if (!grouped[key]) {
            grouped[key] = {
              userId: log.userId,
              userName: userObj ? userObj.name : "Thành viên cũ",
              userRole: userObj ? userObj.role : "N/A",
              projectId: log.projectId,
              projectName: projObj ? projObj.name : "Dự án khác",
              bu: projObj ? projObj.bu : "N/A",
              serviceName: log.service,
              hours: 0
            };
          }
          grouped[key].hours += log.hours;
        });

        return Object.values(grouped).map(item => {
          const projectServiceTotalHours = filteredLogs
            .filter(log => log.projectId === item.projectId && log.service === item.serviceName)
            .reduce((sum, log) => sum + log.hours, 0);

          const projectServicePercentage = projectServiceTotalHours > 0 
            ? ((item.hours / projectServiceTotalHours) * 100).toFixed(1) 
            : "0.0";

          return {
            ...item,
            projectServiceTotalHours,
            projectServicePercentage
          };
        }).sort((a, b) => b.hours - a.hours);
      }, [filteredLogs, users, projects]);

      // Bảng Báo cáo công việc theo Dịch vụ
      const serviceOnlyContributionData = useMemo(() => {
        const grouped = {};

        filteredLogs.forEach(log => {
          const projObj = projects.find(p => p.id === log.projectId);
          const bu = projObj ? projObj.bu : "N/A";
          const key = `${log.userId}_${bu}_${log.service}`;
          const userObj = users.find(u => u.id === log.userId);

          if (!grouped[key]) {
            grouped[key] = {
              userId: log.userId,
              userName: userObj ? userObj.name : "Thành viên cũ",
              userRole: userObj ? userObj.role : "N/A",
              bu: bu,
              serviceName: log.service,
              hours: 0
            };
          }
          grouped[key].hours += log.hours;
        });

        return Object.values(grouped).map(item => {
          const totalHoursForThisService = filteredLogs
            .filter(log => log.service === item.serviceName)
            .reduce((sum, log) => sum + log.hours, 0);

          const servicePercentage = totalHoursForThisService > 0 
            ? ((item.hours / totalHoursForThisService) * 100).toFixed(1) 
            : "0.0";

          return {
            ...item,
            servicePercentage
          };
        }).sort((a, b) => b.hours - a.hours);
      }, [filteredLogs, users, projects]);

      const crossProjectContribution = useMemo(() => {
        const matrix = [];
        users.forEach(user => {
          const userProjectData = {};
          let userTotalHours = 0;

          projects.forEach(project => {
            const hours = filteredLogs
              .filter(log => log.userId === user.id && log.projectId === project.id)
              .reduce((sum, log) => sum + log.hours, 0);
            userProjectData[project.id] = hours;
            userTotalHours += hours;
          });

          if (userTotalHours > 0 || filterUser === "ALL") {
            matrix.push({
              user,
              projectsData: userProjectData,
              totalHours: userTotalHours
            });
          }
        });

        const projectTotals = {};
        projects.forEach(proj => {
          projectTotals[proj.id] = filteredLogs
            .filter(log => log.projectId === proj.id)
            .reduce((sum, log) => sum + log.hours, 0);
        });

        return { matrix, projectTotals };
      }, [filteredLogs, users, projects, filterUser]);

      /* -------------------------------------------------------------
         TAB BÁO CÁO CHI TIẾT & XUẤT EXCEL (TÁCH BIỆT BỘ LỌC THỜI GIAN)
         ------------------------------------------------------------- */
      const [reportFromDate, setReportFromDate] = useState(""); 
      const [reportToDate, setReportToDate] = useState(""); 

      const reportFilteredLogs = useMemo(() => {
        return timeLogs.filter(log => {
          const proj = projects.find(p => p.id === log.projectId);
          const logBU = proj ? proj.bu : "N/A";

          // Giữ nguyên các bộ lọc Context (Dự án, BU, Dịch vụ, Nhân sự) của Dashboard
          const matchProject = filterProject === "ALL" || log.projectId === filterProject;
          const matchBU = filterBU === "ALL" || logBU === filterBU;
          const matchService = filterService === "ALL" || log.service === filterService;
          const matchUser = filterUser === "ALL" || log.userId === filterUser;
          
          // Nhưng áp dụng mốc thời gian riêng cho tab Report
          let matchTime = true;
          if (reportFromDate) matchTime = matchTime && log.date >= reportFromDate;
          if (reportToDate) matchTime = matchTime && log.date <= reportToDate;
          
          return matchProject && matchBU && matchService && matchUser && matchTime;
        });
      }, [timeLogs, filterProject, filterBU, filterService, reportFromDate, reportToDate, filterUser, projects]);

      const reportTotalHoursFiltered = useMemo(() => {
        return reportFilteredLogs.reduce((sum, log) => sum + log.hours, 0);
      }, [reportFilteredLogs]);

      const handleDeleteLog = (logId) => {
        setTimeLogs(prev => prev.filter(log => log.id !== logId));
        triggerToast("Đã xóa dòng nhật ký thành công!", "success");
      };

      const exportToExcel = () => {
        if (typeof window.XLSX === 'undefined') {
          triggerToast("Đang tải thư viện xuất file, vui lòng thử lại sau 1 giây!", "warning");
          return;
        }

        try {
          const XLSX = window.XLSX;
          
          const logsData = reportFilteredLogs.map((log, index) => {
            const userObj = users.find(u => u.id === log.userId);
            const projObj = projects.find(p => p.id === log.projectId);
            return {
              "STT": index + 1,
              "Ngày Thực Hiện": log.date,
              "Nhân Sự": userObj ? userObj.name : "N/A",
              "BU": projObj ? projObj.bu : "N/A",
              "Dự Án": projObj ? projObj.name : "N/A",
              "Dịch Vụ Martech": log.service,
              "Loại Công Việc": log.description,
              "Số Giờ": log.hours,
              "Tuần": log.week,
              "Tháng": log.month,
              "Quý": log.quarter
            };
          });

          // Tái cấu trúc summary cho Sheet 1 & 2 dựa trên reportFilteredLogs
          const projMap = {};
          reportFilteredLogs.forEach(log => {
             projMap[log.projectId] = (projMap[log.projectId] || 0) + log.hours;
          });
          const summaryData = Object.keys(projMap).map((id, index) => {
            const proj = projects.find(p => p.id === id);
            return {
              "STT": index + 1,
              "Mã Dự Án": id,
              "Tên Dự Án": proj ? proj.name : "N/A",
              "Business Unit (BU)": proj ? proj.bu : "N/A",
              "Tổng Số Giờ Hoạt Động": projMap[id],
              "Tỷ Lệ Đóng Góp (%)": reportTotalHoursFiltered > 0 ? ((projMap[id] / reportTotalHoursFiltered) * 100).toFixed(2) : 0
            };
          });

          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summaryData), "Tổng Quan Dự Án");
          XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(logsData), "Nhật Ký Chi Tiết");

          const fileName = `Bao_Cao_Chi_Tiet_Martech_${Date.now().toString().slice(-4)}.xlsx`;
          XLSX.writeFile(wb, fileName);
          triggerToast("Xuất báo cáo Excel thành công!", "success");
        } catch (error) {
          console.error("Lỗi xuất file:", error);
          triggerToast("Lỗi trong quá trình tạo file Excel!", "error");
        }
      };

      /* -------------------------------------------------------------
         TAB 2: NHẬP GIỜ LÀM VIỆC HÀNG TUẦN (BATCH INPUT & SUBMIT)
         ------------------------------------------------------------- */
      const [trackerWeek, setTrackerWeek] = useState(getCurrentWeekString());
      const [trackerRows, setTrackerRows] = useState([
        { projectId: "", serviceName: "", mon: "", tue: "", wed: "", thu: "", fri: "", sat: "", sun: "", desc: "" }
      ]);

      const trackerDays = useMemo(() => {
        return getDaysOfWeek(trackerWeek);
      }, [trackerWeek]);

      const handleAddTrackerRow = () => {
        setTrackerRows([
          ...trackerRows,
          { projectId: "", serviceName: "", mon: "", tue: "", wed: "", thu: "", fri: "", sat: "", sun: "", desc: "" }
        ]);
      };

      const handleRemoveTrackerRow = (index) => {
        if (trackerRows.length === 1) {
          triggerToast("Bạn cần giữ lại ít nhất 1 dòng để nhập liệu!", "error");
          return;
        }
        const updated = [...trackerRows];
        updated.splice(index, 1);
        setTrackerRows(updated);
      };

      const handleTrackerValueChange = (index, field, value) => {
        const updated = [...trackerRows];
        updated[index][field] = value;
        setTrackerRows(updated);
      };

      const handleSubmitTimeLogs = (e) => {
        e.preventDefault();
        
        if (!currentUser) {
          triggerToast("Vui lòng khởi tạo và chọn nhân sự trước khi chấm công!", "error"); 
          return; 
        }

        let hasValidData = false;
        const newLogsToAppend = [];
        const fieldsMap = { mon: 0, tue: 1, wed: 2, thu: 3, fri: 4, sat: 5, sun: 6 };

        for (let i = 0; i < trackerRows.length; i++) {
          const row = trackerRows[i];
          if (!row.projectId) { triggerToast(`Dòng thứ ${i + 1} chưa chọn dự án!`, "error"); return; }
          if (!row.serviceName) { triggerToast(`Dòng thứ ${i + 1} chưa chọn loại hình dịch vụ!`, "error"); return; }

                return;

                userId: currentUser,
                projectId: row.projectId,
                service: row.serviceName,
                date: dateStr,
                hours: val,
                week: trackerWeek,
                month: dateInfoObj.month,
                quarter: dateInfoObj.quarter,
                description: row.desc

                      <input type="date" value={reportToDate} onChange={(e) => setReportToDate(e.target.value)} className="bg-white border border-gray-300 rounded-md px-2 py-1 text-xs text-gray-900 focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500" />
                    </div>
                    <button onClick={exportToExcel} className="w-full sm:w-auto flex items-center justify-center gap-2 px-5 py-2.5 bg-yellow-400 hover:bg-yellow-500 text-gray-900 text-xs font-bold rounded-xl shadow-sm transition-all cursor-pointer"><Download className="w-4.5 h-4.5" /> Xuất File Excel</button>
                  </div>
                </div>

                <div className="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm">
                  <div className="p-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
                    <span className="text-xs font-bold uppercase tracking-wider text-gray-900">Nhật Ký Log Giờ Chi Tiết</span>
                    <span className="text-xs text-gray-500 font-medium">Tổng cộng giờ đang hiển thị: <strong className="text-yellow-600 text-sm font-extrabold">{reportTotalHoursFiltered}h</strong></span>
                  </div>
                  <div className="overflow-x-auto">
                    {reportFilteredLogs.length > 0 ? (
                      <table className="w-full text-left border-collapse min-w-[1000px]">
                        <thead>
                          <tr className="border-b border-gray-200 text-gray-500 text-xs font-semibold uppercase bg-gray-50">
                            <th className="py-3 px-4 w-[10%]">Ngày</th>
                            <th className="py-3 px-4 w-[15%]">Nhân sự</th>
                            <th className="py-3 px-4 w-[5%]">BU</th>
                            <th className="py-3 px-4 w-[25%]">Dự án</th>
                            <th className="py-3 px-4 w-[15%]">Dịch vụ Martech</th>
                            <th className="py-3 px-4 w-[15%]">Loại Công Việc</th>
                            <th className="py-3 px-4 text-center w-[5%]">Thời gian</th>
                            <th className="py-3 px-4 text-center w-[5%]">%</th>
                            <th className="py-3 px-4 text-center w-[5%]">Thao tác</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100 text-xs">
                          {reportFilteredLogs.map(log => {
                            const userObj = users.find(u => u.id === log.userId);
                            const projObj = projects.find(p => p.id === log.projectId);
                            const contribPercent = reportTotalHoursFiltered > 0 ? ((log.hours / reportTotalHoursFiltered) * 100).toFixed(2) : 0;
                            return (
                              <tr key={log.id} className="hover:bg-gray-50 transition-colors">
                                <td className="py-3 px-4 font-semibold text-gray-500 whitespace-nowrap">{log.date}</td>
                                <td className="py-3 px-4"><div className="font-bold text-gray-900">{userObj ? userObj.name : "Unknown"}</div><div className="text-[10px] text-gray-500">{userObj ? userObj.role : ""}</div></td>
                                <td className="py-3 px-4 text-gray-600 font-medium">{projObj ? projObj.bu : "N/A"}</td>
                                <td className="py-3 px-4 text-gray-900 font-semibold max-w-[200px] truncate" title={projObj ? projObj.name : ""}>{projObj ? projObj.name : "N/A"}</td>
                                <td className="py-3 px-4"><span className={`px-2 py-0.5 rounded text-xs font-semibold border ${log.service === "License" ? "bg-gray-100 text-gray-700 border-gray-200" : "bg-yellow-50 text-yellow-700 border-yellow-200"}`}>{log.service}</span></td>
                                <td className="py-3 px-4 text-gray-700 font-semibold">{log.description}</td>
                                <td className="py-3 px-4 text-center font-bold text-gray-900 text-sm whitespace-nowrap bg-gray-50">{log.hours}h</td>
                                <td className="py-3 px-4 text-center text-yellow-600 font-semibold">{contribPercent}%</td>
                                <td className="py-3 px-4 text-center">
                                  <button onClick={() => handleDeleteLog(log.id)} className="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors cursor-pointer" title="Xóa dòng nhật ký này">
                                    <Trash2 className="w-4.5 h-4.5" />
                                  </button>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    ) : (
                      <div className="p-10 text-center text-gray-500 flex flex-col items-center justify-center gap-2"><FileSpreadsheet className="w-10 h-10 opacity-30" /><span>Không tìm thấy dữ liệu hoặc chưa có dữ liệu.</span></div>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* ======================= TAB 4: CẤU HÌNH ======================= */}
            {activeTab === 'settings' && (
              <div className="space-y-6">
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                  <div className="bg-white p-6 rounded-2xl border border-gray-200 flex flex-col shadow-sm space-y-4">
                    <h3 className="text-base font-bold text-gray-900 flex items-center gap-2 border-b border-gray-100 pb-3"><FolderPlus className="w-5 h-5 text-yellow-500" /> Khai báo & Tạo Dự Án Martech Mới</h3>
                    <form onSubmit={handleCreateProject} className="space-y-4">
                      <div>
                        <label className="block text-xs text-gray-500 mb-1.5 font-medium uppercase tracking-wider">Tên dự án Martech</label>
                        <input type="text" placeholder="Nhập tên dự án" required value={newProjectName} onChange={(e) => setNewProjectName(e.target.value)} className="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-xl text-xs focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 text-gray-900" />
                      </div>
                      <div>
                        <label className="block text-xs text-gray-500 mb-1.5 font-medium uppercase tracking-wider">Gán Business Unit (BU)</label>
                        <select value={newProjectBU} onChange={(e) => setNewProjectBU(e.target.value)} className="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-xl text-xs focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 text-gray-900 cursor-pointer">
                          {BUSINESS_UNITS.map(bu => <option key={bu} value={bu}>{bu}</option>)}
                        </select>
                      </div>
                      {customFields.length > 0 && (
                        <div className="space-y-3 bg-gray-50 p-3 rounded-xl border border-gray-200">
                          <span className="block text-[11px] text-yellow-600 font-bold uppercase tracking-wider mb-1">Các thông tin cấu hình thêm:</span>
                          {customFields.map(field => (
                            <div key={field.id}>
                              <label className="block text-[11px] text-gray-500 mb-1">{field.label}</label>
                              <input type={field.type} placeholder={field.placeholder || "Nhập giá trị..."} value={newProjectCustomData[field.id] || ""} onChange={(e) => handleCustomFieldValueChange(field.id, e.target.value)} className="w-full px-3 py-2 bg-white border border-gray-300 rounded-lg text-xs text-gray-900 focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500" />
                            </div>
                          ))}
                        </div>
                      )}
                      <div>
                        <label className="block text-xs text-gray-500 mb-1.5 font-medium uppercase tracking-wider">Chọn nhân sự tham gia dự án</label>
                        <div className="grid grid-cols-2 gap-2 bg-gray-50 p-3 rounded-xl border border-gray-200 max-h-[140px] overflow-y-auto">
                          {users.length > 0 ? users.map(u => (
                            <label key={u.id} className="flex items-center gap-2 text-xs text-gray-700 hover:text-gray-900 cursor-pointer py-0.5">
                              <input type="checkbox" checked={newProjectMembers.includes(u.id)} onChange={() => toggleMemberSelection(u.id)} className="rounded bg-white border-gray-300 text-yellow-500 focus:ring-yellow-500 w-3.5 h-3.5" />
                              <span>{u.name} ({u.role})</span>
                            </label>
                          )) : <div className="text-xs text-gray-400 col-span-2 italic">Chưa có nhân sự nào.</div>}
                        </div>
                      </div>
                      <div>
                        <label className="block text-xs text-gray-500 mb-1.5 font-medium uppercase tracking-wider font-semibold">Gán loại dịch vụ Martech áp dụng</label>
                        <div className="flex gap-4 bg-gray-50 p-3 rounded-xl border border-gray-200">
                          {services.map((srv, idx) => (
                            <label key={idx} className="flex items-center gap-2 text-xs text-gray-700 hover:text-gray-900 cursor-pointer py-0.5">
                              <input type="checkbox" checked={newProjectServices.includes(idx)} onChange={() => toggleServiceSelection(idx)} className="rounded bg-white border-gray-300 text-yellow-500 focus:ring-yellow-500 w-3.5 h-3.5" />
                              <span>{srv}</span>
                            </label>
                          ))}
                        </div>
                      </div>
                      <button type="submit" className="w-full py-2.5 bg-yellow-400 hover:bg-yellow-500 text-gray-900 text-xs font-bold rounded-xl shadow-sm transition-all cursor-pointer flex items-center justify-center gap-2"><Plus className="w-4.5 h-4.5" /> Tạo Dự Án Mới</button>
                    </form>
                  </div>

                  <div className="bg-white p-6 rounded-2xl border border-gray-200 flex flex-col shadow-sm space-y-5">
                    <div>
                      <h3 className="text-base font-bold text-gray-900 flex items-center gap-2 border-b border-gray-100 pb-3"><Sliders className="w-5 h-5 text-gray-400" /> Cấu Hình Trực Tiếp Trường Dữ Liệu Tùy Chỉnh</h3>
                      <p className="text-xs text-gray-500 mt-1">Cài đặt thêm các trường dữ liệu động để cá nhân hóa thông tin của Tab khai báo dự án mới.</p>
                    </div>
                    <form onSubmit={handleAddCustomField} className="space-y-3 bg-gray-50 p-4 rounded-xl border border-gray-200">
                      <span className="block text-xs font-bold text-yellow-600 uppercase tracking-wider">Thêm mới trường dữ liệu</span>
                      <div className="grid grid-cols-2 gap-3">
                        <div>
                          <label className="block text-[10px] text-gray-500 mb-1 uppercase">Tên trường</label>
                          <input type="text" placeholder="Ví dụ: Ngân sách..." value={tempFieldLabel} onChange={(e) => setTempFieldLabel(e.target.value)} className="w-full px-3 py-2 bg-white border border-gray-300 rounded-lg text-xs text-gray-900 focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500" />
                        </div>
                        <div>
                          <label className="block text-[10px] text-gray-500 mb-1 uppercase">Kiểu dữ liệu</label>
                          <select value={tempFieldType} onChange={(e) => setTempFieldType(e.target.value)} className="w-full px-3 py-2 bg-white border border-gray-300 rounded-lg text-xs text-gray-900 cursor-pointer focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500">
                            <option value="text">Chữ (Text)</option><option value="number">Số (Number)</option><option value="date">Ngày tháng (Date)</option>
                          </select>
                        </div>
                      </div>
                      <div>
                        <label className="block text-[10px] text-gray-500 mb-1 uppercase">Placeholder</label>
                        <input type="text" placeholder="Gợi ý nhập liệu..." value={tempFieldPlaceholder} onChange={(e) => setTempFieldPlaceholder(e.target.value)} className="w-full px-3 py-2 bg-white border border-gray-300 rounded-lg text-xs text-gray-900 focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500" />
                      </div>
                      <button type="submit" className="w-full py-2 bg-gray-800 hover:bg-gray-900 text-white text-xs font-bold rounded-lg transition-all cursor-pointer flex items-center justify-center gap-1.5 shadow-sm"><Plus className="w-4 h-4" /> Kích Hoạt Thêm Trường Dữ Liệu</button>
                    </form>
                    <div className="space-y-2">
                      <span className="block text-xs font-bold text-gray-900 uppercase tracking-wider">Danh sách trường đang sử dụng ({customFields.length})</span>
                      {customFields.length > 0 ? (
                        <div className="space-y-2">
                          {customFields.map(field => (
                            <div key={field.id} className="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-200">
                              <div><span className="text-xs font-bold text-gray-900">{field.label}</span><span className="text-[10px] bg-yellow-100 text-yellow-700 border border-yellow-200 px-1.5 py-0.5 rounded font-mono ml-2">{field.type}</span></div>
                              <button type="button" onClick={() => handleRemoveCustomField(field.id, field.label)} className="p-1.5 text-gray-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg transition-all cursor-pointer"><Trash2 className="w-4 h-4" /></button>
                            </div>
                          ))}
                        </div>
                      ) : (
                        <div className="text-center py-4 text-xs text-gray-400 italic bg-gray-50 p-3 rounded-xl border border-gray-200">Chưa có trường dữ liệu tùy chỉnh nào được thiết lập.</div>
                      )}
                    </div>
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                  <div className="bg-white p-6 rounded-2xl border border-gray-200 flex flex-col shadow-sm space-y-4">
                    <h3 className="text-base font-bold text-gray-900 flex items-center gap-2 border-b border-gray-100 pb-3"><User className="w-5 h-5 text-yellow-500" /> Khai Báo Nhân Sự Mới</h3>
                    <form onSubmit={handleAddUser} className="space-y-4">
                      <div><label className="block text-xs text-gray-500 mb-1.5 font-medium uppercase tracking-wider">Họ và Tên</label><input type="text" placeholder="VD: Nguyen Van A" required value={newUserName} onChange={(e) => setNewUserName(e.target.value)} className="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-xl text-xs focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 text-gray-900" /></div>
                      <div>
                        <label className="block text-xs text-gray-500 mb-1.5 font-medium uppercase tracking-wider">Vai trò (Role)</label>
                        <select value={newUserRole} onChange={(e) => setNewUserRole(e.target.value)} className="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-xl text-xs focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 text-gray-900 cursor-pointer">
                          <option value="Project Manager">Project Manager</option><option value="Tech Lead">Tech Lead</option><option value="Martech Engineer">Martech Engineer</option><option value="Data Analyst">Data Analyst</option><option value="Solution Architect">Solution Architect</option><option value="Account Executive">Account Executive</option><option value="UI/UX Designer">UI/UX Designer</option><option value="Media Buyer">Media Buyer</option><option value="SEO Specialist">SEO Specialist</option>
                        </select>
                      </div>
                      <div><label className="block text-xs text-gray-500 mb-1.5 font-medium uppercase tracking-wider">Email liên hệ (Tùy chọn)</label><input type="email" placeholder="VD: a.nguyen@martech.vn" value={newUserEmail} onChange={(e) => setNewUserEmail(e.target.value)} className="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-xl text-xs focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 text-gray-900" /></div>
                      <button type="submit" className="w-full py-2.5 bg-yellow-400 hover:bg-yellow-500 text-gray-900 text-xs font-bold rounded-xl shadow-sm transition-all cursor-pointer flex items-center justify-center gap-2 mt-2"><Plus className="w-4 h-4" /> Khởi Tạo Nhân Sự</button>
                    </form>
                  </div>
                  <div className="bg-white p-6 rounded-2xl border border-gray-200 flex flex-col shadow-sm space-y-4">
                    <h3 className="text-base font-bold text-gray-900 flex items-center gap-2 border-b border-gray-100 pb-3"><Users className="w-5 h-5 text-gray-400" /> Danh Sách Nhân Sự Hiện Tại ({users.length})</h3>
                    <div className="overflow-y-auto max-h-[300px] pr-2 space-y-2 scrollbar-thin scrollbar-thumb-gray-300">
                      {users.length > 0 ? users.map(u => (
                        <div key={u.id} className="flex justify-between items-center p-3 bg-gray-50 rounded-xl border border-gray-200">
                          <div className="flex items-center gap-3">
                            <div className="w-8 h-8 rounded-full bg-white flex items-center justify-center text-yellow-600 font-bold border border-gray-200 shadow-sm">{u.name.charAt(0)}</div>
                            <div><div className="text-sm font-bold text-gray-900">{u.name}</div><div className="text-[10px] text-gray-500">{u.email || 'Chưa cập nhật email'}</div></div>
                          </div>
                          <span className="text-[10px] bg-yellow-100 text-yellow-700 border border-yellow-200 px-2.5 py-1 rounded-md font-semibold">{u.role}</span>
                        </div>
                      )) : <div className="text-xs text-gray-400 text-center mt-4">Hệ thống chưa có dữ liệu nhân sự.</div>}
                    </div>
                  </div>
                </div>

                <div className="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm">
                  <h3 className="text-sm font-bold uppercase tracking-wider text-gray-900 mb-4 flex items-center gap-2"><Briefcase className="w-4.5 h-4.5 text-yellow-500" /> Danh sách dự án Martech hệ thống đang vận hành ({projects.length})</h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {projects.length > 0 ? projects.map(proj => (
                      <div key={proj.id} className="bg-gray-50 p-4 rounded-xl border border-gray-200 flex flex-col justify-between space-y-3">
                        <div>
                          <div className="flex justify-between items-start">
                            <div className="flex gap-2">
                              <span className="text-[10px] bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded border border-yellow-200 font-bold">{proj.id}</span>
                              <span className="text-[10px] bg-gray-800 text-white px-2 py-0.5 rounded border border-gray-900 font-bold">{proj.bu}</span>
                            </div>
                            <span className="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded border border-emerald-200 font-semibold">{proj.status}</span>
                          </div>
                          <h4 className="text-sm font-bold text-gray-900 mt-2">{proj.name}</h4>
                          {Object.keys(proj.customData || {}).length > 0 && (
                            <div className="mt-2 pt-2 border-t border-gray-200 space-y-1">
                              {Object.entries(proj.customData).map(([fieldId, val]) => {
                                const fieldDef = customFields.find(f => f.id === fieldId);
                                if (!fieldDef || !val) return null;
                                return <div key={fieldId} className="text-[11px] text-gray-500"><span className="font-semibold text-gray-700">{fieldDef.label}:</span> {val}</div>;
                              })}
                            </div>
                          )}
                        </div>
                        <div className="space-y-2">
                          <div>
                            <span className="text-[10px] text-gray-500 font-semibold uppercase block">Nhân sự tham gia:</span>
                            <div className="flex flex-wrap gap-1.5 mt-1">
                              {proj.members.map(memberId => {
                                const u = users.find(x => x.id === memberId);
                                return u ? <span key={memberId} className="text-[10px] bg-white text-gray-700 px-2 py-1 rounded border border-gray-200 flex items-center gap-1 shadow-sm"><User className="w-2.5 h-2.5 text-yellow-500" />{u.name}</span> : null;
                              })}
                            </div>
                          </div>
                          <div>
                            <span className="text-[10px] text-gray-500 font-semibold uppercase block">Dịch vụ áp dụng:</span>
                            <div className="flex flex-wrap gap-1 mt-1">
                              {proj.services.map(srvIdx => <span key={srvIdx} className="text-[9px] bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded border border-gray-200">{services[srvIdx]}</span>)}
                            </div>
                          </div>
                        </div>
                      </div>
                    )) : <div className="text-xs text-gray-400 text-center col-span-2">Hệ thống chưa có dự án nào được tạo.</div>}
                  </div>
                </div>
              </div>
            )}
          </main>

          {/* Footer */}
          <footer className="bg-white border-t border-gray-200 py-4 px-6 text-center text-xs text-gray-500">
            <div className="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-2">
              <span>&copy; 2026 AKA MARTECH AGENCY - Dashboard Quản Lý & Chấm Công Dự Án Toàn Diện</span>
              <span className="text-yellow-600 font-semibold">Cộng tác cùng đội ngũ Martech Engineers</span>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
